<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출석체크 — ContractOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Freesentation:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0f172a;--blue:#3b6ef0;--green:#10b981;--red:#ef4444;
  --amber:#f59e0b;--purple:#8b5cf6;
  --t1:#1a2233;--t2:#5a6a85;--t3:#9aa5bb;
  --border:#e4e8f0;--bg:#f4f6fb;--surface:#fff;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Freesentation',sans-serif;color:var(--t1)}

/* ── 전체 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:100vw}

/* ── 상단 헤더 ── */
#header{
  background:var(--navy);
  padding:0 20px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  gap:12px;
}
#header-left{display:flex;align-items:center;gap:12px}
#header-logo{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px}
#header-event{font-size:13px;color:rgba(255,255,255,.55);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header-right{display:flex;align-items:center;gap:8px}
#header-date{font-size:12px;color:rgba(255,255,255,.4)}
#btn-admin-back{
  padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;color:rgba(255,255,255,.7);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .15s
}
#btn-admin-back:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── 행사 선택 바 ── */
#event-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.ev-chip{
  padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;
  white-space:nowrap;cursor:pointer;border:1.5px solid var(--border);
  background:var(--bg);color:var(--t2);transition:all .15s;flex-shrink:0;
}
.ev-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(59,110,240,.3)}
.ev-chip:active{transform:scale(.96)}

/* ── 메인 그리드 ── */
#main{flex:1;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:700px){#main{grid-template-columns:1fr;grid-template-rows:auto 1fr}}

/* ── 왼쪽: 스캐너 패널 ── */
#scanner-panel{
  background:var(--navy);
  display:flex;flex-direction:column;
  overflow-y:auto;
  padding:16px;gap:12px;
}

/* 카메라 뷰 */
#video-wrap{
  background:#000;border-radius:16px;overflow:hidden;
  position:relative;width:100%;aspect-ratio:1;max-height:260px;flex-shrink:0;
}
#att-video{width:100%;height:100%;object-fit:cover;display:none}
#scan-overlay{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;pointer-events:none;
}
#scan-frame{
  width:55%;aspect-ratio:1;position:relative;
}
#scan-frame::before,#scan-frame::after,
.sf-br::before,.sf-br::after{
  content:'';position:absolute;width:22px;height:22px;border-color:#3b6ef0;border-style:solid;
}
#scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0}
#scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0}
.sf-br{position:absolute;bottom:0;left:0;right:0;width:100%;height:100%}
.sf-br::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.sf-br::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px}
@keyframes scanLine{0%{top:8%}100%{top:88%}}
#scan-line{position:absolute;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,#3b6ef0,transparent);animation:scanLine 2s ease-in-out infinite;border-radius:1px}
#video-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;
}
#video-placeholder .big{font-size:42px;margin-bottom:4px}

#btn-camera{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#3b6ef0,#6366f1);
  border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px rgba(59,110,240,.35);
  flex-shrink:0;
}
#btn-camera:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,110,240,.45)}
#btn-camera:active{transform:scale(.97)}
#btn-camera.on{background:linear-gradient(135deg,#dc2626,#ef4444);box-shadow:0 4px 16px rgba(239,68,68,.35)}

/* 이름 입력 */
.input-section{flex-shrink:0}
.input-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.06em;margin-bottom:7px}
#name-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px;color:#fff;font-size:15px;font-family:inherit;outline:none;
  transition:all .2s;
}
#name-input::placeholder{color:rgba(255,255,255,.25)}
#name-input:focus{border-color:#3b6ef0;background:rgba(59,110,240,.15);box-shadow:0 0 0 4px rgba(59,110,240,.2)}

.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
#btn-in,#btn-out{
  padding:14px;border:none;border-radius:12px;
  font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;
  transition:all .15s;
}
#btn-in{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3)}
#btn-out{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.25)}
#btn-in:active,#btn-out:active{transform:scale(.95)}

/* 결과창 */
#result-box{
  border-radius:14px;padding:16px;min-height:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:4px;flex-shrink:0;
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);
  transition:all .3s;
}
#result-box.success{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.5)}
#result-box.error{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.4)}
#result-box.idle{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
#result-icon{font-size:28px;line-height:1}
#result-name{font-size:18px;font-weight:800;color:#fff;margin-top:2px}
#result-sub{font-size:12px;color:rgba(255,255,255,.5)}

/* 미니 통계 */
.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex-shrink:0}
.mini-stat{background:rgba(255,255,255,.07);border-radius:10px;padding:10px;text-align:center}
.mini-stat .n{font-size:22px;font-weight:800;color:#fff;line-height:1}
.mini-stat .l{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;font-weight:600}
.mini-stat.green .n{color:#6ee7b7}
.mini-stat.red .n{color:#fca5a5}
.mini-stat.amber .n{color:#fde68a}

/* 최근 기록 */
.recent-section{flex:1;min-height:0;display:flex;flex-direction:column}
.recent-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.06em;margin-bottom:8px;flex-shrink:0}
.recent-list{overflow-y:auto;flex:1}
.recent-list::-webkit-scrollbar{width:3px}
.recent-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.recent-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);
  animation:fadeSlide .25s ease;
}
.recent-item:last-child{border-bottom:none}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.tag-in{background:rgba(16,185,129,.2);color:#6ee7b7;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0}
.tag-out{background:rgba(239,68,68,.2);color:#fca5a5;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0}
.recent-name{color:rgba(255,255,255,.85);font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-time{color:rgba(255,255,255,.3);font-size:11px;flex-shrink:0}

/* ── 오른쪽: 명단 패널 ── */
#list-panel{
  background:var(--bg);
  display:flex;flex-direction:column;overflow:hidden;
}
#list-header{
  padding:14px 16px 10px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#list-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:8px}
#list-search{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;color:var(--t1);
  background:var(--bg);transition:border-color .15s;
}
#list-search:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,110,240,.1)}
#list-scroll{flex:1;overflow-y:auto;padding:8px 12px}
#list-scroll::-webkit-scrollbar{width:4px}
#list-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 스태프 카드 */
.staff-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
  transition:all .15s;
}
.staff-card:active{transform:scale(.98)}
.staff-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#3b6ef0,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;flex-shrink:0;
}
.staff-avatar.done{background:linear-gradient(135deg,#059669,#10b981)}
.staff-avatar.out{background:linear-gradient(135deg,#dc2626,#ef4444)}
.staff-info{flex:1;min-width:0}
.staff-name{font-size:14px;font-weight:700;color:var(--t1)}
.staff-phone{font-size:12px;color:var(--t3);margin-top:1px}
.staff-times{font-size:11px;color:var(--t2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.staff-times span{display:flex;align-items:center;gap:3px}
.staff-status{text-align:right;flex-shrink:0}
.staff-badge{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:6px;
}
.staff-badge.none{background:#f1f5f9;color:#94a3b8}
.staff-badge.in{background:#d1fae5;color:#059669}
.staff-badge.full{background:#ede9fe;color:#7c3aed}
.staff-btn-row{display:flex;gap:4px;justify-content:flex-end}
.s-btn{
  padding:5px 10px;border-radius:7px;border:none;
  font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .12s;
}
.s-btn:active{transform:scale(.92)}
.s-btn-in{background:#d1fae5;color:#059669}
.s-btn-out{background:#fee2e2;color:#dc2626}
.s-btn-undo{background:#f1f5f9;color:#64748b}
.s-btn:hover{filter:brightness(.95)}

/* 하단 액션 바 */
#bottom-bar{
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 12px;display:flex;gap:8px;flex-shrink:0;
  align-items:center;
}
#summary-text{font-size:12px;color:var(--t3);flex:1;line-height:1.5}
#btn-excel{
  padding:9px 16px;background:var(--green);border:none;border-radius:10px;
  color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
}
#btn-excel:hover{background:#059669}
#btn-excel:active{transform:scale(.96)}

/* ── 토스트 ── */
#toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast-item{
  background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;
  font-size:13px;font-weight:600;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  animation:toastIn .25s ease;font-family:inherit;
}
.toast-item.success{background:#059669}
.toast-item.error{background:#dc2626}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── 모달: 행사없음 ── */
#no-event-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;text-align:center;padding:32px;
}
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div id="header">
    <div id="header-left">
      <div id="header-logo">⚡ 출석체크</div>
      <div id="header-event" id="header-event-name">행사 선택</div>
    </div>
    <div id="header-right">
      <div id="header-date"></div>
      <button id="btn-admin-back" onclick="goAdmin()">← 관리자</button>
    </div>
  </div>

  <!-- 행사 선택 칩 바 -->
  <div id="event-bar"></div>

  <!-- 메인 -->
  <div id="main">

    <!-- 왼쪽: 스캐너 -->
    <div id="scanner-panel">

      <!-- 카메라 -->
      <div id="video-wrap" onclick="if(!camOn)startCamera()">
        <video id="att-video" autoplay playsinline muted></video>
        <canvas id="att-canvas" style="display:none"></canvas>
        <div id="scan-overlay">
          <div id="scan-frame">
            <div class="sf-br"></div>
            <div id="scan-line"></div>
          </div>
        </div>
        <div id="video-placeholder">
          <div class="big">📷</div>
          <div>탭하여 카메라 켜기</div>
        </div>
      </div>

      <button id="btn-camera" onclick="toggleCamera()">📷 카메라 켜기</button>

      <!-- 이름 입력 -->
      <div class="input-section">
        <div class="input-label">이름 또는 전화번호 뒤 4자리</div>
        <input id="name-input" placeholder="예: 홍길동 또는 5678"
          autocomplete="off" autocorrect="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'){event.preventDefault();process('in')}">
      </div>

      <div class="btn-row">
        <button id="btn-in" onclick="process('in')">✅ 출근</button>
        <button id="btn-out" onclick="process('out')">🚪 퇴근</button>
      </div>

      <!-- 결과창 -->
      <div id="result-box" class="idle">
        <div id="result-icon">📡</div>
        <div id="result-name" style="font-size:14px;color:rgba(255,255,255,.4)">스캔하거나 이름 입력</div>
        <div id="result-sub"></div>
      </div>

      <!-- 통계 -->
      <div class="mini-stats">
        <div class="mini-stat green"><div class="n" id="stat-in">0</div><div class="l">출근</div></div>
        <div class="mini-stat red"><div class="n" id="stat-out">0</div><div class="l">퇴근</div></div>
        <div class="mini-stat amber"><div class="n" id="stat-working">0</div><div class="l">근무중</div></div>
      </div>

      <!-- 최근 기록 -->
      <div class="recent-section">
        <div class="recent-title">최근 처리 기록</div>
        <div class="recent-list" id="recent-list"></div>
      </div>

    </div>

    <!-- 오른쪽: 명단 -->
    <div id="list-panel">
      <div id="list-header">
        <div id="list-title">스태프 명단</div>
        <input id="list-search" placeholder="🔍 이름 검색" oninput="renderList()" autocomplete="off">
      </div>
      <div id="list-scroll"></div>
      <div id="bottom-bar">
        <div id="summary-text"></div>
        <button id="btn-excel" onclick="downloadExcel()">📊 엑셀 저장</button>
      </div>
    </div>

  </div>
</div>

<div id="toast-wrap"></div>
<canvas id="att-canvas" style="display:none"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ─────────────────────────────────────────────────────
// DB — contract-saas.html 과 같은 localStorage 키 사용
// ─────────────────────────────────────────────────────
const DB={
  get(k){try{return JSON.parse(localStorage.getItem('cos_'+k)||'[]')}catch{return[]}},
  set(k,v){localStorage.setItem('cos_'+k,JSON.stringify(v))},
  getObj(k){try{return JSON.parse(localStorage.getItem('cos_'+k)||'{}')}catch{return{}}}
};
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36);
const fmtDate=d=>d?new Date(d).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'';
const fmtTime=d=>d?new Date(d).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'';
const fmtDT=d=>d?fmtDate(d)+' '+fmtTime(d):'';

// ─────────────────────────────────────────────────────
// 상태
// ─────────────────────────────────────────────────────
let currentEventId = '';
let camOn = false;
let videoStream = null;
let scanInterval = null;
let resultTimer = null;
let lastScanned = ''; // 연속 중복 스캔 방지

// ─────────────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────────────
function init(){
  // URL 파라미터에서 이벤트 ID 읽기
  const params = new URLSearchParams(location.search);
  const evParam = params.get('event');

  const events = DB.get('events');
  if(events.length === 0){
    document.getElementById('event-bar').innerHTML = '<span style="font-size:13px;color:#9aa5bb">등록된 행사가 없습니다. 관리자 화면에서 행사를 먼저 등록하세요.</span>';
    document.getElementById('main').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#9aa5bb;font-size:14px;flex-direction:column;gap:10px"><div style="font-size:40px">🎪</div><div>행사를 먼저 등록해 주세요</div></div>';
    return;
  }

  // 이벤트 선택
  if(evParam && events.find(e=>e.id===evParam)){
    currentEventId = evParam;
  } else {
    // 오늘 날짜와 가장 가까운 행사 자동 선택
    const today = new Date().toISOString().slice(0,10);
    const sorted = [...events].sort((a,b)=>{
      const da = Math.abs(new Date(a.date)-new Date(today));
      const db = Math.abs(new Date(b.date)-new Date(today));
      return da-db;
    });
    currentEventId = sorted[0].id;
  }

  renderEventBar();
  renderHeader();
  updateStats();
  renderList();
  renderRecent();

  // 시계
  updateClock();
  setInterval(updateClock, 1000);

  // 1초마다 통계·명단 갱신 (다른 기기에서 입력한 것 반영)
  setInterval(()=>{
    updateStats();
    renderList();
    renderRecent();
  }, 3000);
}

function updateClock(){
  const el = document.getElementById('header-date');
  if(el) el.textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function renderHeader(){
  const ev = DB.get('events').find(e=>e.id===currentEventId);
  const el = document.getElementById('header-event');
  if(el && ev) el.textContent = ev.name + (ev.date?' · '+fmtDate(ev.date):'');
}

// ─────────────────────────────────────────────────────
// 행사 선택 칩 바
// ─────────────────────────────────────────────────────
function renderEventBar(){
  const events = DB.get('events');
  const bar = document.getElementById('event-bar');
  bar.innerHTML = events.map(ev=>`
    <div class="ev-chip ${ev.id===currentEventId?'active':''}" onclick="selectEvent('${ev.id}')">
      ${ev.name}<span style="font-size:10px;opacity:.7;margin-left:4px">${fmtDate(ev.date)}</span>
    </div>
  `).join('');
}

function selectEvent(id){
  // 행사 바꾸면 카메라 끄기
  if(camOn) stopCamera();
  currentEventId = id;

  // URL 업데이트
  const url = new URL(location.href);
  url.searchParams.set('event', id);
  history.replaceState({}, '', url);

  renderEventBar();
  renderHeader();
  updateStats();
  renderList();
  renderRecent();
  resetResult();
}

// ─────────────────────────────────────────────────────
// 출석 처리
// ─────────────────────────────────────────────────────
function process(type){
  const query = document.getElementById('name-input').value.trim();
  if(!query){ toast('이름 또는 전화번호를 입력하세요','error'); return; }
  const found = findWorker(query);
  if(!found){ showResult(false, `'${query}' — 찾을 수 없습니다`, ''); return; }
  addLog(found.workerName, type, '수동입력');
  document.getElementById('name-input').value = '';
  showResult(true, found.workerName, type);
  refreshAll();
}

function addLog(workerName, type, method){
  const logs = DB.get('att_logs');
  logs.push({id:uid(), eventId:currentEventId, workerName, type, time:new Date().toISOString(), method});
  DB.set('att_logs', logs);
}

function findWorker(query){
  const contracts = DB.get('contracts').filter(c=>c.eventId===currentEventId);
  return contracts.find(c=>{
    const nameMatch = c.workerName && c.workerName.includes(query);
    const phoneClean = (c.phone||'').replace(/-/g,'');
    const queryClean = query.replace(/-/g,'');
    const phoneMatch = phoneClean.endsWith(queryClean) && queryClean.length >= 4;
    return nameMatch || phoneMatch;
  });
}

function refreshAll(){
  updateStats();
  renderList();
  renderRecent();
}

// ─────────────────────────────────────────────────────
// 결과창
// ─────────────────────────────────────────────────────
function showResult(ok, name, type){
  const box = document.getElementById('result-box');
  const icon = document.getElementById('result-icon');
  const nameEl = document.getElementById('result-name');
  const sub = document.getElementById('result-sub');

  if(resultTimer) clearTimeout(resultTimer);

  if(ok){
    box.className = 'result-box success';
    icon.textContent = type==='in'?'✅':'🚪';
    nameEl.textContent = name;
    nameEl.style.color = '#fff';
    sub.textContent = (type==='in'?'출근 완료':'퇴근 완료') + ' · ' + fmtTime(new Date().toISOString());
  } else {
    box.className = 'result-box error';
    icon.textContent = '❌';
    nameEl.textContent = name;
    nameEl.style.color = '#fca5a5';
    sub.textContent = '계약 명단에서 찾을 수 없습니다';
  }

  // 진동 피드백 (모바일)
  if(navigator.vibrate) navigator.vibrate(ok?[60]:[100,50,100]);

  resultTimer = setTimeout(resetResult, 4000);
}

function resetResult(){
  const box = document.getElementById('result-box');
  box.className = 'result-box idle';
  document.getElementById('result-icon').textContent = '📡';
  document.getElementById('result-name').textContent = '스캔하거나 이름 입력';
  document.getElementById('result-name').style.color = 'rgba(255,255,255,.4)';
  document.getElementById('result-sub').textContent = '';
}

// ─────────────────────────────────────────────────────
// 통계
// ─────────────────────────────────────────────────────
function updateStats(){
  const logs = DB.get('att_logs').filter(l=>l.eventId===currentEventId);
  const inCount = logs.filter(l=>l.type==='in').length;
  const outCount = logs.filter(l=>l.type==='out').length;
  const working = Math.max(0, inCount-outCount);
  document.getElementById('stat-in').textContent = inCount;
  document.getElementById('stat-out').textContent = outCount;
  document.getElementById('stat-working').textContent = working;

  // 하단 요약
  const contracts = DB.get('contracts').filter(c=>c.eventId===currentEventId);
  const total = contracts.length;
  // 한 번이라도 출근한 사람 수
  const checkedIn = new Set(logs.filter(l=>l.type==='in').map(l=>l.workerName)).size;
  document.getElementById('summary-text').innerHTML =
    `전체 <strong>${total}</strong>명 &nbsp;·&nbsp; 출근 <strong style="color:#059669">${checkedIn}</strong>명 &nbsp;·&nbsp; 미출근 <strong style="color:#dc2626">${total-checkedIn}</strong>명`;
}

// ─────────────────────────────────────────────────────
// 스태프 명단
// ─────────────────────────────────────────────────────
function renderList(){
  const contracts = DB.get('contracts').filter(c=>c.eventId===currentEventId);
  const logs = DB.get('att_logs').filter(l=>l.eventId===currentEventId);
  const search = document.getElementById('list-search')?.value.trim().toLowerCase()||'';
  const filtered = search ? contracts.filter(c=>(c.workerName||'').toLowerCase().includes(search)) : contracts;

  if(filtered.length === 0){
    document.getElementById('list-scroll').innerHTML =
      `<div style="text-align:center;padding:40px 20px;color:var(--t3)">
        <div style="font-size:32px;margin-bottom:10px">${search?'🔍':'📝'}</div>
        <div>${search?'검색 결과가 없습니다':'계약 완료된 스태프가 없습니다'}</div>
      </div>`;
    return;
  }

  // 미출근 → 근무중 → 퇴근 순 정렬
  const withStatus = filtered.map(c=>{
    const wLogs = logs.filter(l=>l.workerName===c.workerName);
    const lastIn = wLogs.filter(l=>l.type==='in').slice(-1)[0];
    const lastOut = wLogs.filter(l=>l.type==='out').slice(-1)[0];
    let status = 'none';
    if(lastIn && lastOut && new Date(lastOut.time)>new Date(lastIn.time)) status='full';
    else if(lastIn) status='in';
    return {...c, status, lastIn, lastOut};
  });
  withStatus.sort((a,b)=>{
    const order={in:0,full:1,none:2};
    return (order[a.status]??2)-(order[b.status]??2);
  });

  document.getElementById('list-scroll').innerHTML = withStatus.map(c=>{
    const {status, lastIn, lastOut} = c;
    const avatarClass = status==='full'?'staff-avatar done':status==='in'?'staff-avatar':status==='none'?'staff-avatar':'staff-avatar out';
    const avatarLetter = (c.workerName||'?')[0];
    const badgeClass = status==='in'?'staff-badge in':status==='full'?'staff-badge full':'staff-badge none';
    const badgeText = status==='in'?'근무중':status==='full'?'완료':'미출근';

    let timeHtml = '';
    if(lastIn) timeHtml += `<span>✅ ${fmtTime(lastIn.time)}</span>`;
    if(lastOut) timeHtml += `<span>🚪 ${fmtTime(lastOut.time)}</span>`;

    // 근무 시간 계산
    let workHtml = '';
    if(lastIn && lastOut && new Date(lastOut.time)>new Date(lastIn.time)){
      const mins = Math.round((new Date(lastOut.time)-new Date(lastIn.time))/60000);
      workHtml = `<span>⏱ ${Math.floor(mins/60)}h ${mins%60}m</span>`;
    }

    return `
    <div class="staff-card" id="card-${c.id}">
      <div class="${avatarClass}">${avatarLetter}</div>
      <div class="staff-info">
        <div class="staff-name">${c.workerName}</div>
        <div class="staff-phone">${c.phone||''}</div>
        ${timeHtml||workHtml?`<div class="staff-times">${timeHtml}${workHtml}</div>`:''}
      </div>
      <div class="staff-status">
        <div class="${badgeClass}">${badgeText}</div>
        <div class="staff-btn-row">
          <button class="s-btn s-btn-in" onclick="manualProcess('${c.workerName}','in')">출근</button>
          <button class="s-btn s-btn-out" onclick="manualProcess('${c.workerName}','out')">퇴근</button>
          <button class="s-btn s-btn-undo" onclick="undoLast('${c.workerName}')">취소</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function manualProcess(name, type){
  addLog(name, type, '관리자수동');
  showResult(true, name, type);
  refreshAll();
}

function undoLast(name){
  const logs = DB.get('att_logs');
  const idx = logs.map((l,i)=>({...l,_i:i}))
    .filter(l=>l.eventId===currentEventId&&l.workerName===name)
    .slice(-1)[0];
  if(!idx){ toast('취소할 기록이 없습니다','error'); return; }
  logs.splice(idx._i, 1);
  DB.set('att_logs', logs);
  toast(`${name} 마지막 기록 취소`, 'info');
  refreshAll();
}

// ─────────────────────────────────────────────────────
// 최근 기록
// ─────────────────────────────────────────────────────
function renderRecent(){
  const logs = DB.get('att_logs')
    .filter(l=>l.eventId===currentEventId)
    .slice(-12).reverse();
  const el = document.getElementById('recent-list');
  if(!el) return;
  if(logs.length===0){
    el.innerHTML = '<div style="color:rgba(255,255,255,.2);font-size:12px;padding:8px 0">아직 기록이 없습니다</div>';
    return;
  }
  el.innerHTML = logs.map(l=>`
    <div class="recent-item">
      <span class="${l.type==='in'?'tag-in':'tag-out'}">${l.type==='in'?'출근':'퇴근'}</span>
      <span class="recent-name">${l.workerName}</span>
      <span class="recent-time">${fmtTime(l.time)}</span>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────────────
// 카메라 QR 스캔
// ─────────────────────────────────────────────────────
async function toggleCamera(){
  camOn ? stopCamera() : await startCamera();
}

async function startCamera(){
  const btn = document.getElementById('btn-camera');
  const placeholder = document.getElementById('video-placeholder');
  const overlay = document.getElementById('scan-overlay');
  const video = document.getElementById('att-video');
  try{
    // 후면 카메라 우선
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    videoStream = stream;
    camOn = true;
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    overlay.style.display = 'flex';
    btn.textContent = '⏹ 카메라 끄기';
    btn.classList.add('on');

    // BarcodeDetector (크롬/안드로이드)
    if('BarcodeDetector' in window){
      const detector = new BarcodeDetector({formats:['qr_code']});
      const canvas = document.getElementById('att-canvas');
      scanInterval = setInterval(async()=>{
        if(!video || video.readyState < 2) return;
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        try{
          const results = await detector.detect(canvas);
          if(results.length > 0){
            const val = results[0].rawValue;
            if(val !== lastScanned){
              lastScanned = val;
              processQR(val);
              setTimeout(()=>{ lastScanned=''; }, 3000); // 3초 후 같은 QR 다시 허용
            }
          }
        }catch(e){}
      }, 400);
    } else {
      toast('이 브라우저는 QR 자동인식 미지원. 이름을 직접 입력하세요.', 'info');
    }
  }catch(e){
    toast('카메라 권한을 허용해 주세요 (브라우저 설정)', 'error');
  }
}

function stopCamera(){
  const btn = document.getElementById('btn-camera');
  const placeholder = document.getElementById('video-placeholder');
  const overlay = document.getElementById('scan-overlay');
  const video = document.getElementById('att-video');
  if(videoStream){ videoStream.getTracks().forEach(t=>t.stop()); videoStream=null; }
  if(scanInterval){ clearInterval(scanInterval); scanInterval=null; }
  camOn = false;
  video.style.display = 'none';
  placeholder.style.display = 'flex';
  overlay.style.display = 'none';
  btn.textContent = '📷 카메라 켜기';
  btn.classList.remove('on');
}

function processQR(val){
  // 계약서 링크 토큰이 포함된 경우 (예: ...#sign/evt_abc123)
  // 또는 이름/전화번호 직접 인코딩된 경우
  let query = val;

  // 링크 형태면 이름 추출 시도
  if(val.includes('http')){
    // QR에 이름이 인코딩되어 있으면 파라미터에서 추출
    try{
      const u = new URL(val);
      const nameParam = u.searchParams.get('name') || u.searchParams.get('worker');
      if(nameParam) query = decodeURIComponent(nameParam);
    }catch(e){}
  }

  const found = findWorker(query);
  if(found){
    const logs = DB.get('att_logs').filter(l=>l.eventId===currentEventId&&l.workerName===found.workerName);
    const hasIn = logs.some(l=>l.type==='in');
    const hasOut = hasIn && logs.filter(l=>l.type==='in').length <= logs.filter(l=>l.type==='out').length;
    const type = (!hasIn || hasOut) ? 'in' : 'out';
    addLog(found.workerName, type, 'QR스캔');
    showResult(true, found.workerName, type);
    refreshAll();
  } else {
    showResult(false, `QR: ${query.slice(0,20)}`, '');
  }
}

// ─────────────────────────────────────────────────────
// 엑셀 저장
// ─────────────────────────────────────────────────────
function downloadExcel(){
  const ev = DB.get('events').find(e=>e.id===currentEventId)||{};
  const contracts = DB.get('contracts').filter(c=>c.eventId===currentEventId);
  const logs = DB.get('att_logs').filter(l=>l.eventId===currentEventId);

  const rows=[['이름','연락처','출근 시간','퇴근 시간','근무 시간','상태']];
  contracts.forEach(c=>{
    const wLogs = logs.filter(l=>l.workerName===c.workerName);
    const lastIn = wLogs.filter(l=>l.type==='in').slice(-1)[0];
    const lastOut = wLogs.filter(l=>l.type==='out').slice(-1)[0];
    let workTime='', status='미출근';
    if(lastIn && lastOut && new Date(lastOut.time)>new Date(lastIn.time)){
      const m=Math.round((new Date(lastOut.time)-new Date(lastIn.time))/60000);
      workTime=`${Math.floor(m/60)}h ${m%60}m`;
      status='완료';
    } else if(lastIn){ status='근무중'; }
    rows.push([c.workerName,c.phone,lastIn?fmtDT(lastIn.time):'-',lastOut?fmtDT(lastOut.time):'-',workTime,status]);
  });

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:15},{wch:20},{wch:20},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,'출석명단');
  XLSX.writeFile(wb,`출석_${ev.name||'행사'}_${new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')}.xlsx`);
  toast('엑셀 저장 완료!','success');
}

// 관리자 화면으로 이동

function goAdmin(){
  // contract-saas.html 이 같은 폴더에 있다고 가정
  location.href = 'contract-saas.html';
}

// ─────────────────────────────────────────────────────
// 토스트
// ─────────────────────────────────────────────────────
function toast(msg, type='info'){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = (type==='success'?'✓ ':type==='error'?'✕ ':'ℹ ')+msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; }, 2200);
  setTimeout(()=>el.remove(), 2600);
}

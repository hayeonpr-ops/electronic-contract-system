<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractOS — 슈퍼 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Freesentation:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a0f1e;--navy2:#0f172a;--navy3:#1a2540;
  --blue:#3b6ef0;--blue2:#6366f1;--blue3:#818cf8;--blue-l:#eff6ff;--blue-m:#dbeafe;
  --green:#10b981;--green-l:#d1fae5;--green-t:#059669;
  --amber:#f59e0b;--amber-l:#fef3c7;--amber-t:#b45309;
  --red:#ef4444;--red-l:#fee2e2;--red-t:#dc2626;
  --purple:#8b5cf6;--purple-l:#ede9fe;--purple-t:#7c3aed;
  --bg:#f4f6fb;--surface:#fff;--surface2:#f8fafc;
  --border:#e4e8f0;--border2:#d0d7e6;
  --t1:#1a2233;--t2:#5a6a85;--t3:#9aa5bb;
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
body{font-family:'Freesentation',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.6;min-height:100vh}

/* 로그인 */
#login-screen{position:fixed;inset:0;background:linear-gradient(145deg,var(--navy),var(--navy3),#1a1040);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.login-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.login-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(59,110,240,.4)}
.login-title{font-size:22px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:-.5px}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:28px;line-height:1.6}
#sa-warn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:16px;text-align:center;display:none}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.06em;margin-bottom:6px}
.lf input{width:100%;padding:13px 16px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:all .2s}
.lf input::placeholder{color:rgba(255,255,255,.2)}
.lf input:focus{border-color:var(--blue);background:rgba(59,110,240,.15);box-shadow:0 0 0 4px rgba(59,110,240,.2)}
.login-btn-sa{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 6px 24px rgba(59,110,240,.4);transition:all .2s}
.login-btn-sa:hover{transform:translateY(-1px)}
.login-note{margin-top:18px;font-size:11px;color:rgba(255,255,255,.2);text-align:center;line-height:1.7}

/* 앱 */
#app{display:none;min-height:100vh}
#topbar{background:var(--navy2);height:56px;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:100}
.tb-logo{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px}
.tb-logo span{color:var(--blue3)}
.tb-badge{background:rgba(239,68,68,.25);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-dev{font-size:12px;color:rgba(255,255,255,.4)}
.btn-logout{padding:7px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(255,255,255,.6);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-logout:hover{background:rgba(239,68,68,.2);color:#fca5a5}

/* 탭 */
#tabnav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 24px;overflow-x:auto}
.tn{padding:14px 16px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tn.on{color:var(--blue);border-bottom-color:var(--blue)}
.tn:hover:not(.on){color:var(--t1)}

/* 콘텐츠 */
#content{padding:22px}

/* 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}

/* 통계 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-n{font-size:24px;font-weight:700}
.stat-l{font-size:12px;color:var(--t3);font-weight:600;margin-top:2px}
.stat-s{font-size:11px;color:var(--t3);margin-top:3px}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-starter{background:#f1f5f9;color:#64748b}
.b-pro{background:var(--blue-m);color:#1d4ed8}
.b-enterprise{background:var(--purple-l);color:var(--purple-t)}
.b-active{background:var(--green-l);color:var(--green-t)}
.b-inactive{background:#f1f5f9;color:#94a3b8}
.b-suspended{background:var(--red-l);color:var(--red-t)}
.b-trial{background:var(--amber-l);color:var(--amber-t)}

/* 테이블 */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
thead{background:var(--surface2)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{background:#2d5de0}
.btn-ok{background:var(--green);color:#fff}
.btn-ok:hover{background:var(--green-t)}
.btn-d{background:var(--red-l);color:var(--red-t);border:1px solid #fecaca}
.btn-d:hover{background:#fee2e2}
.btn-g{background:var(--surface2);color:var(--t2);border:1px solid var(--border)}
.btn-g:hover{background:var(--border)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-w{background:var(--amber-l);color:var(--amber-t);border:1px solid #fde68a}

/* 폼 */
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px}
.fi,.fs,.ft{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--t1);background:var(--surface);outline:none;transition:all .15s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,110,240,.1)}
.ft{resize:vertical;min-height:80px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* 모달 */
.mo{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mb{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column}
.mb-lg{max-width:720px}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt{font-size:15px;font-weight:700}
.mx{width:28px;height:28px;border-radius:7px;background:var(--surface2);border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.mx:hover{background:var(--border)}
.mbody{padding:16px 20px;overflow-y:auto;flex:1}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* 요금제 편집 카드 */
.plan-edit-card{border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;background:var(--surface2);transition:border-color .2s}
.plan-edit-card.featured{border-color:var(--blue);background:var(--blue-l)}
.plan-edit-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

/* 라이선스 박스 */
.lic-box{background:var(--navy2);border-radius:8px;padding:9px 14px;font-family:monospace;font-size:12px;color:#93c5fd;letter-spacing:.05em;cursor:pointer;border:1px solid rgba(99,163,253,.2);word-break:break-all;transition:all .15s}
.lic-box:hover{border-color:rgba(99,163,253,.4)}

/* 권한 토글 */
.perm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:7px}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.t-track{position:absolute;inset:0;background:var(--border);border-radius:10px;cursor:pointer;transition:all .2s}
.toggle input:checked ~ .t-track{background:var(--blue)}
.t-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:all .2s;pointer-events:none}
.toggle input:checked ~ .t-track .t-thumb{transform:translateX(16px)}

/* 기타 */
.ph{text-align:center;padding:36px 20px;color:var(--t3)}
.ph .pi{font-size:32px;margin-bottom:10px}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--t3);margin-top:2px}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sep{font-size:13px;font-weight:700;color:var(--t1);margin:14px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.info-box{background:var(--blue-l);border:1px solid var(--blue-m);border-radius:8px;padding:10px 14px;font-size:12px;color:#1d4ed8;margin-top:10px}

/* 토스트 */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--navy2);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;max-width:360px}
.toast.ok{background:#059669}
.toast.err{background:#dc2626}
.toast.info{background:var(--blue)}

/* 로그 */
.log-dot{display:inline-block;width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">⚙️</div>
    <div class="login-title">슈퍼 관리자 패널</div>
    <div class="login-sub">ContractOS 개발자 전용<br>승인된 인원만 접근 가능합니다</div>
    <div id="sa-warn"></div>
    <div class="lf"><label>개발자 ID</label><input type="text" id="sa-id" placeholder="개발자 아이디" autocomplete="off"></div>
    <div class="lf"><label>마스터 비밀번호</label><input type="password" id="sa-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')saLogin()"></div>
    <button class="login-btn-sa" onclick="saLogin()">🔐 접속하기</button>
    <div class="login-note">이 페이지는 소프트웨어 제공자만 접근 가능합니다<br>무단 접근 시도는 기록됩니다</div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div id="topbar">
    <div class="tb-logo">Contract<span>OS</span></div>
    <div class="tb-badge">🔐 SUPER ADMIN</div>
    <div class="tb-right">
      <div class="tb-dev" id="tb-devname">개발자</div>
      <button class="btn-logout" onclick="saLogout()">로그아웃</button>
    </div>
  </div>
  <div id="tabnav">
    <div class="tn on" data-tab="dashboard">📊 대시보드</div>
    <div class="tn" data-tab="subscribers">👥 구독자 관리</div>
    <div class="tn" data-tab="licenses">🔑 라이선스</div>
    <div class="tn" data-tab="activity">📋 활동 로그</div>
    <div class="tn" data-tab="settings">⚙️ 시스템 설정</div>
  </div>
  <div id="content"></div>
</div>

<!-- 모달들은 JS로 동적 생성 -->
<div id="toast-wrap"></div>

<script>
'use strict';

// ── 마스터 계정 ──────────────────────────────────────
const SA_ACCOUNTS = [
  { id: 'superadmin', pw: 'dlalwls486!!', name: '개발자 (Worklo)' }
];

// ── DB ───────────────────────────────────────────────
const DB = {
  get(k)    { try { return JSON.parse(localStorage.getItem('sa_'+k) || '[]'); } catch(e) { return []; } },
  set(k,v)  { localStorage.setItem('sa_'+k, JSON.stringify(v)); },
  obj(k)    { try { return JSON.parse(localStorage.getItem('sa_'+k) || '{}'); } catch(e) { return {}; } },
  setObj(k,v){ localStorage.setItem('sa_'+k, JSON.stringify(v)); }
};

// ── 유틸 ─────────────────────────────────────────────
const uid   = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const fmt   = d => d ? new Date(d).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}) : '-';
const fmtDT = d => d ? new Date(d).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
const money = n => n ? '₩' + Number(n).toLocaleString() : '-';
const isExp = d => d && new Date(d) < new Date();
const statusLbl = s => ({active:'활성',trial:'체험중',inactive:'비활성',suspended:'정지'})[s] || s;
const planLbl   = p => (p||'').toUpperCase();

function simpleHash(pw) {
  let h = 0; const s = pw + 'contractos_salt_2025';
  for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);h=((h<<5)-h)+c;h=h&h;}
  return 'h' + Math.abs(h).toString(36) + s.length.toString(36);
}
function randPW() { return Math.random().toString(36).slice(2,10) + '!A1'; }
function genKey() {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const s=()=>Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');
  return 'COS-'+s()+'-'+s()+'-'+s();
}
function copyTxt(t) {
  if(!t||t.includes('누르세요')||t.includes('자동'))return;
  navigator.clipboard.writeText(t).then(()=>toast('복사됨','ok')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('복사됨','ok');
  });
}
function addLog(title, detail, type) {
  const logs = DB.get('logs');
  logs.push({id:uid(),title,detail,type:type||'ok',time:new Date().toISOString()});
  if(logs.length>500) logs.splice(0,logs.length-500);
  DB.set('logs',logs);
}
function toast(msg, type) {
  const w = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'ok');
  el.textContent = (type==='ok'?'✓ ':type==='err'?'✕ ':'ℹ ') + msg;
  w.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; }, 2800);
  setTimeout(()=>el.remove(), 3200);
}

// ── 로그인 ───────────────────────────────────────────
function saLogin() {
  const id = document.getElementById('sa-id').value.trim();
  const pw = document.getElementById('sa-pw').value;
  const warn = document.getElementById('sa-warn');
  const acct = SA_ACCOUNTS.find(a => a.id===id && a.pw===pw);
  if(!acct) {
    warn.style.display='block'; warn.textContent='아이디 또는 비밀번호가 올바르지 않습니다';
    addLog('로그인 실패','ID: '+id,'err');
    return;
  }
  sessionStorage.setItem('cos_sa_session', JSON.stringify({id:acct.id,name:acct.name,loginAt:new Date().toISOString()}));
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tb-devname').textContent = acct.name;
  addLog('슈퍼 관리자 로그인', acct.name, 'ok');
  showTab('dashboard');
}
function saLogout() { sessionStorage.removeItem('cos_sa_session'); location.reload(); }
function checkSA() {
  const s = sessionStorage.getItem('cos_sa_session');
  if(!s) return;
  const sess = JSON.parse(s);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tb-devname').textContent = sess.name;
  showTab('dashboard');
}

// ── 탭 라우터 ────────────────────────────────────────
let curTab = 'dashboard';
document.getElementById('tabnav').addEventListener('click', e => {
  const tn = e.target.closest('.tn');
  if(tn && tn.dataset.tab) showTab(tn.dataset.tab);
});
function showTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tn').forEach(el => el.classList.toggle('on', el.dataset.tab===tab));
  const renders = {dashboard:renderDashboard, subscribers:renderSubscribers, licenses:renderLicenses, activity:renderActivity, settings:renderSettings};
  if(renders[tab]) renders[tab]();
}

// ══════════════════════════════════════════════════════
// 대시보드
// ══════════════════════════════════════════════════════
function renderDashboard() {
  const subs = DB.get('subscribers');
  const lics = DB.get('licenses');
  const active = subs.filter(s=>s.status==='active');
  const mrr = active.reduce((a,s)=>a+Number(s.fee||0),0);
  const logs = DB.get('logs').slice(-6).reverse();
  const recentSubs = subs.slice(-5).reverse();

  const el = document.getElementById('content');
  el.innerHTML = '';

  // 헤더
  const hd = document.createElement('div');
  hd.className='page-hd';
  hd.innerHTML = '<div><div class="page-title">📊 대시보드</div><div class="page-sub">ContractOS 전체 현황</div></div>';
  const addBtn = document.createElement('button');
  addBtn.className='btn btn-p'; addBtn.textContent='+ 구독자 등록';
  addBtn.onclick = openAddSub;
  hd.appendChild(addBtn);
  el.appendChild(hd);

  // 통계
  const sg = document.createElement('div');
  sg.className='stat-grid';
  [
    {n:subs.length, l:'전체 구독자', s:'활성 '+active.length+' · 체험 '+subs.filter(s=>s.status==='trial').length, c:'var(--blue)'},
    {n:active.length, l:'활성 구독자', s:'유료 '+subs.filter(s=>s.plan!=='starter'&&s.status==='active').length+'명', c:'var(--green)'},
    {n:'₩'+mrr.toLocaleString(), l:'월 매출 MRR', s:'연 ₩'+(mrr*12).toLocaleString(), c:'var(--purple)'},
    {n:lics.length, l:'발급 라이선스', s:'유효 '+lics.filter(l=>!isExp(l.expire)).length+'개', c:'var(--amber)'},
  ].forEach(d => {
    const b = document.createElement('div'); b.className='stat-box';
    b.innerHTML = '<div class="stat-n" style="color:'+d.c+'">'+d.n+'</div><div class="stat-l">'+d.l+'</div><div class="stat-s">'+d.s+'</div>';
    sg.appendChild(b);
  });
  el.appendChild(sg);

  // 2열 그리드
  const grid = document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px';

  // 최근 구독자
  const c1 = document.createElement('div'); c1.className='card';
  let h1 = '<div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between">최근 구독자 <button class="btn btn-g btn-sm" onclick="showTab(\'subscribers\')">전체 →</button></div>';

let subSrch='', subPlan='', subStat='';

function renderSubscribers() {
  let subs = DB.get('subscribers');
  if(subSrch) subs = subs.filter(s=>(s.company+s.name+s.email).toLowerCase().includes(subSrch.toLowerCase()));
  if(subPlan) subs = subs.filter(s=>s.plan===subPlan);
  if(subStat) subs = subs.filter(s=>s.status===subStat);
  const total = DB.get('subscribers').length;

  const el = document.getElementById('content');
  el.innerHTML='';

  // 헤더
  const hd=document.createElement('div'); hd.className='page-hd';
  hd.innerHTML='<div><div class="page-title">👥 구독자 관리</div><div class="page-sub">전체 '+total+'명</div></div>';

  const btnAdd=document.createElement('button'); btnAdd.className='btn btn-p'; btnAdd.textContent='+ 등록'; btnAdd.onclick=openAddSub;

  const si=document.createElement('input'); si.className='fi'; si.placeholder='🔍 회사명·담당자·이메일'; si.value=subSrch; si.style.maxWidth='220px';
  si.oninput=()=>{subSrch=si.value; renderSubscribers();};
  const sp=document.createElement('select'); sp.className='fs'; sp.style.maxWidth='140px';
  [['','전체 플랜'],['starter','STARTER'],['pro','PRO'],['enterprise','ENTERPRISE']].forEach(([v,t])=>{
    const o=document.createElement('option'); o.value=v; o.textContent=t; if(v===subPlan)o.selected=true; sp.appendChild(o);
  });

  const ss=document.createElement('select'); ss.className='fs'; ss.style.maxWidth='130px';

    const o=document.createElement('option'); o.value=v; o.textContent=t; if(v===subStat)o.selected=true; ss.appendChild(o);
  });
  ss.onchange=()=>{subStat=ss.value; renderSubscribers();};
  fb.append(si,sp,ss); el.appendChild(fb);

  if(subs.length===0) {
    const c=document.createElement('div'); c.className='card';
    c.innerHTML='<div class="ph"><div class="pi">👥</div><p>구독자 없음</p></div>';
    el.appendChild(c); return;
  }

  const tw=document.createElement('div'); tw.className='tbl-wrap';
  const tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>회사명</th><th>사업자번호</th><th>담당자</th><th>이메일</th><th>플랜</th><th>상태</th><th>월요금</th><th>만료일</th><th>라이선스 키</th><th>액션</th></tr></thead>';
  const tbody=document.createElement('tbody');
  subs.forEach(s => {
    const tr=document.createElement('tr');
    tr.innerHTML='<td><div style="font-weight:600">'+s.company+'</div><div style="font-size:11px;color:var(--t3)">'+s.ceo+'</div></td>'
      +'<td style="font-size:11px;font-family:monospace">'+( s.bizno||'-')+'</td>'
      +'<td>'+s.name+'</td>'
      +'<td style="font-size:11px;color:var(--t2)">'+s.email+'</td>'
      +'<td><span class="badge b-'+s.plan+'">'+planLbl(s.plan)+'</span></td>'
      +'<td><span class="badge b-'+s.status+'">'+statusLbl(s.status)+'</span></td>'
      +'<td style="font-weight:600;color:var(--blue)">'+money(s.fee)+'</td>'
      +'<td style="font-size:11px;color:'+(isExp(s.end)?'var(--red)':'var(--t2)')+'">'+fmt(s.end)+'</td>'
      +'<td><div class="lic-box" style="padding:4px 8px;font-size:10px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(s.license||'')+'" onclick="copyTxt(\''+s.license+'\')">'+( s.license||'미발급')+'</div></td>'
      +'<td></td>';
    const td=tr.lastElementChild;

    const b3=document.createElement('button'); b3.className='btn btn-d btn-sm'; b3.textContent='삭제'; b3.onclick=()=>delSub(s.id);
    df.append(b1,b2,b3); td.appendChild(df);

  });
  tbl.appendChild(tbody); tw.appendChild(tbl); el.appendChild(tw);
}

function saveSub() {
  const company = document.getElementById('sb-company')?.value.trim();
  const name    = document.getElementById('sb-name')?.value.trim();
  const email   = document.getElementById('sb-email')?.value.trim().toLowerCase();
  if(!company||!name||!email) { toast('회사명, 담당자, 이메일은 필수입니다','err'); return; }

  const licEl   = document.getElementById('sb-lic');
  const licText = licEl?.textContent||'';
  const license = (licText==='저장 시 자동 생성'||!licText) ? genKey() : licText;

  const pw = document.getElementById('sb-pw')?.value || randPW();
  const data = {
    company, name, email, pw, license,
    bizno:   document.getElementById('sb-bizno')?.value||'',
    ceo:     document.getElementById('sb-ceo')?.value||'',
    biztype: document.getElementById('sb-biztype')?.value||'',
    address: document.getElementById('sb-address')?.value||'',
    phone:   document.getElementById('sb-phone')?.value||'',
    plan:    document.getElementById('sb-plan')?.value||'pro',
    status:  document.getElementById('sb-status')?.value||'active',
    start:   document.getElementById('sb-start')?.value||'',
    end:     document.getElementById('sb-end')?.value||'',
    fee:     document.getElementById('sb-fee')?.value||'',
    memo:    document.getElementById('sb-memo')?.value||'',
  };

  const subs = DB.get('subscribers');
  if(editingSubId) {
    const idx = subs.findIndex(s=>s.id===editingSubId);
    if(idx>-1) { subs[idx]={...subs[idx],...data,updatedAt:new Date().toISOString()}; }
    DB.set('subscribers',subs);
    addLog('구독자 수정',company,'ok');
    toast('수정 완료','ok');
  } else {
    // cos_users 연동 (index.html 로그인)
    const cosUsers = JSON.parse(localStorage.getItem('cos_users')||'[]');
    if(!cosUsers.find(u=>u.email===email)) {
      cosUsers.push({id:uid(),name,company,email,pw:simpleHash(pw),plan:data.plan,createdAt:new Date().toISOString()});
      localStorage.setItem('cos_users',JSON.stringify(cosUsers));
    }
    subs.push({id:uid(),...data,permissions:defaultPerms(),createdAt:new Date().toISOString()});
    DB.set('subscribers',subs);
    addLog('구독자 등록',company+' / '+email,'ok');
    toast('등록 완료! 라이선스: '+license,'ok');
  }
  removeModal();
  renderSubscribers();
}

function delSub(id) {
  const s = DB.get('subscribers').find(x=>x.id===id);
  if(!s||!confirm(s.company+' 구독자를 삭제하시겠습니까?')) return;
  DB.set('subscribers',DB.get('subscribers').filter(x=>x.id!==id));
  addLog('구독자 삭제',s.company,'err');
  toast('삭제됨','ok');
  renderSubscribers();
}

// ── 권한 설정 ────────────────────────────────────────
const PERMS = [
  {key:'contract',  name:'계약 관리',     desc:'행사 생성, 계약자 추가·삭제'},
  {key:'notice',    name:'사전안내 관리', desc:'안내문 작성·배포'},
  {key:'attendance',name:'QR 출석체크',   desc:'출석 전용 페이지 접근'},
  {key:'stats',     name:'통계 조회',     desc:'매출·인원 통계 열람'},
  {key:'excel',     name:'엑셀 다운로드', desc:'계약자 명단 내보내기'},
  {key:'pdf',       name:'PDF 출력',      desc:'계약서 PDF 생성'},
  {key:'templates', name:'템플릿 편집',   desc:'계약서 양식 추가·수정'},
  {key:'multi_user',name:'다중 관리자',   desc:'추가 계정 초대 (Enterprise 전용)'},
];
function defaultPerms() { return Object.fromEntries(PERMS.map(p=>[p.key,true])); }

let permSubId='';
function openPerm(id) {
  permSubId=id;
  const s = DB.get('subscribers').find(x=>x.id===id); if(!s) return;
  removeModal();
  const perms = s.permissions||defaultPerms();
  const ov=document.createElement('div'); ov.className='mo'; ov.id='modal-perm';
  ov.onclick=e=>{if(e.target===ov)removeModal();};
  const box=document.createElement('div'); box.className='mb';
  const head=document.createElement('div'); head.className='mh';
  head.innerHTML='<div class="mt">🛡️ 권한 설정</div>';
  const mx=document.createElement('button'); mx.className='mx'; mx.textContent='✕'; mx.onclick=removeModal;
  head.appendChild(mx); box.appendChild(head);
  const body=document.createElement('div'); body.className='mbody';
  const info=document.createElement('div'); info.style.cssText='font-size:13px;color:var(--t2);margin-bottom:12px';
  info.textContent=s.company+' ('+s.name+') — '+planLbl(s.plan)+' 플랜';
  body.appendChild(info);
  PERMS.forEach(p=>{
    const item=document.createElement('div'); item.className='perm-item';
    const lbl=document.createElement('label'); lbl.className='toggle'; lbl.htmlFor='p-'+p.key;
    const inp=document.createElement('input'); inp.type='checkbox'; inp.id='p-'+p.key; inp.checked=perms[p.key]!==false;
    const trk=document.createElement('div'); trk.className='t-track';
    const thm=document.createElement('div'); thm.className='t-thumb';
    trk.appendChild(thm); lbl.append(inp,trk);
    item.innerHTML='<div><div style="font-size:13px;font-weight:600;color:var(--t1)">'+p.name+'</div><div style="font-size:11px;color:var(--t3)">'+p.desc+'</div></div>';
    item.appendChild(lbl); body.appendChild(item);
  });
  box.appendChild(body);
  const foot=document.createElement('div'); foot.className='mf';
  const bc=document.createElement('button'); bc.className='btn btn-g'; bc.textContent='닫기'; bc.onclick=removeModal;
  const bs=document.createElement('button'); bs.className='btn btn-p'; bs.textContent='권한 저장'; bs.onclick=savePerm;
  foot.append(bc,bs); box.appendChild(foot);
  ov.appendChild(box); document.body.appendChild(ov);
}
function savePerm() {
  const subs=DB.get('subscribers');
  const idx=subs.findIndex(s=>s.id===permSubId); if(idx<0) return;
  const perms={};
  PERMS.forEach(p=>{ perms[p.key]=document.getElementById('p-'+p.key)?.checked??true; });
  subs[idx].permissions=perms;
  DB.set('subscribers',subs);
  addLog('권한 변경',subs[idx].company,'ok');
  toast('권한 저장됨','ok');
  removeModal();
}

function openIssueLic() {
  removeModal();
  const ov=document.createElement('div'); ov.className='mo'; ov.id='modal-lic';
  ov.onclick=e=>{if(e.target===ov)removeModal();};
  const box=document.createElement('div'); box.className='mb';
  const head=document.createElement('div'); head.className='mh';
  head.innerHTML='<div class="mt">🔑 라이선스 발급</div>';
  const mx=document.createElement('button'); mx.className='mx'; mx.textContent='✕'; mx.onclick=removeModal;
  head.appendChild(mx); box.appendChild(head);
  const body=document.createElement('div'); body.className='mbody';

  const g=document.createElement('div'); g.className='g2'; g.style.marginBottom='12px';
  const selSub=document.createElement('select'); selSub.className='fs'; selSub.id='lic-sub';
  selSub.innerHTML='<option value="">— 구독자 선택 —</option>';
  DB.get('subscribers').forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.company+' ('+s.name+')';selSub.appendChild(o);});
  const selPlan=document.createElement('select'); selPlan.className='fs'; selPlan.id='lic-plan';
  selPlan.innerHTML='<option value="starter">STARTER</option><option value="pro" selected>PRO</option><option value="enterprise">ENTERPRISE</option>';
  const fg1=document.createElement('div');fg1.className='fg';fg1.innerHTML='<label class="fl">구독자</label>';fg1.appendChild(selSub);
  const fg2=document.createElement('div');fg2.className='fg';fg2.innerHTML='<label class="fl">플랜</label>';fg2.appendChild(selPlan);
  g.append(fg1,fg2); body.appendChild(g);

  body.innerHTML+='';
  const fg3=document.createElement('div');fg3.className='fg';fg3.style.marginBottom='12px';
  fg3.innerHTML='<label class="fl">만료일 (비워두면 무제한)</label><input class="fi" type="date" id="lic-expire">';
  body.appendChild(fg3);
  const fg4=document.createElement('div');fg4.className='fg';fg4.style.marginBottom='14px';
  fg4.innerHTML='<label class="fl">메모</label><input class="fi" id="lic-memo" placeholder="발급 사유">';
  body.appendChild(fg4);

  const genBtn=document.createElement('button');genBtn.className='btn btn-g';genBtn.style.marginBottom='10px';genBtn.textContent='🔄 키 생성';
  const licPrev=document.createElement('div');licPrev.className='lic-box';licPrev.id='lic-preview';licPrev.style.cssText='min-height:40px;display:flex;align-items:center;margin-top:8px';
  licPrev.textContent='생성 버튼을 누르세요';
  licPrev.onclick=()=>copyTxt(licPrev.textContent);
  genBtn.onclick=()=>{ licPrev.textContent=genKey(); };
  body.append(genBtn,licPrev);
  const note=document.createElement('div');note.style.cssText='font-size:11px;color:var(--t3);margin-top:6px';note.textContent='클릭하면 복사됩니다';
  body.appendChild(note);
  box.appendChild(body);

  const foot=document.createElement('div'); foot.className='mf';
  const bc=document.createElement('button');bc.className='btn btn-g';bc.textContent='닫기';bc.onclick=removeModal;
  const bs=document.createElement('button');bs.className='btn btn-p';bs.textContent='📤 발급 & 저장';
  bs.onclick=()=>{
    const key=document.getElementById('lic-preview')?.textContent;
    if(!key||key.includes('누르세요')){toast('키를 먼저 생성하세요','err');return;}
    const subId=document.getElementById('lic-sub')?.value;
    const sub=DB.get('subscribers').find(s=>s.id===subId);
    const lics=DB.get('licenses');
    lics.push({id:uid(),key,subId,subName:sub?.company||'',plan:document.getElementById('lic-plan')?.value||'pro',expire:document.getElementById('lic-expire')?.value||null,memo:document.getElementById('lic-memo')?.value||'',issuedAt:new Date().toISOString()});
    DB.set('licenses',lics);
    addLog('라이선스 발급',key,'ok');
    toast('발급 완료 — 클립보드 복사됨','ok');
    copyTxt(key);
    removeModal();
    if(curTab==='licenses') renderLicenses();
  };
  foot.append(bc,bs); box.appendChild(foot);
  ov.appendChild(box); document.body.appendChild(ov);
}
function delLic(id){if(!confirm('삭제?'))return;DB.set('licenses',DB.get('licenses').filter(l=>l.id!==id));toast('삭제됨','ok');renderLicenses();}

function renderActivity() {
  const logs = DB.get('logs').slice().reverse();
  const el = document.getElementById('content'); el.innerHTML='';
  const hd=document.createElement('div');hd.className='page-hd';
  hd.innerHTML='<div><div class="page-title">📋 활동 로그</div><div class="page-sub">'+logs.length+'건</div></div>';
  const btn=document.createElement('button');btn.className='btn btn-d';btn.textContent='초기화';
  btn.onclick=()=>{if(!confirm('초기화?'))return;DB.set('logs',[]);toast('완료','ok');renderActivity();};
  hd.appendChild(btn); el.appendChild(hd);
  if(logs.length===0){const c=document.createElement('div');c.className='card';c.innerHTML='<div class="ph"><div class="pi">📋</div><p>로그 없음</p></div>';el.appendChild(c);return;}
  const tw=document.createElement('div');tw.className='tbl-wrap';
  const tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>시간</th><th>유형</th><th>내용</th><th>상세</th></tr></thead>';
  const tbody=document.createElement('tbody');
  logs.forEach(l=>{
    const col=l.type==='ok'?'var(--green)':l.type==='err'?'var(--red)':'var(--amber)';
    const tr=document.createElement('tr');
    tr.innerHTML='<td style="font-size:11px;color:var(--t2);white-space:nowrap">'+fmtDT(l.time)+'</td>'
      +'<td><div class="log-dot" style="background:'+col+'"></div></td>'
      +'<td style="font-weight:600">'+l.title+'</td>'
      +'<td style="font-size:12px;color:var(--t2)">'+l.detail+'</td>';
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);tw.appendChild(tbl);el.appendChild(tw);
}

  const clrBtn=document.createElement('button');clrBtn.className='btn btn-d';clrBtn.textContent='⚠️ 초기화';
  clrBtn.onclick=()=>{if(!confirm('정말 슈퍼 관리자 데이터를 초기화하시겠습니까?'))return;['subscribers','licenses','logs','config'].forEach(k=>DB.set(k,[]));toast('초기화 완료','ok');renderSettings();};
  dataRow.append(expBtn,clrBtn); c4.appendChild(dataRow);
  el.appendChild(c4);
}

function saveCfg() {
  const cfg = {
    serviceName:  document.getElementById('cfg-svc')?.value,
    devName:      document.getElementById('cfg-dev')?.value,
    supportEmail: document.getElementById('cfg-email')?.value,
    supportTel:   document.getElementById('cfg-tel')?.value,
    serviceUrl:   document.getElementById('cfg-url')?.value,
    pricingTitle: document.getElementById('cfg-ptitle')?.value,
    pricingSub:   document.getElementById('cfg-psub')?.value,
  };
  DB.setObj('config', cfg);
  localStorage.setItem('sa_config', JSON.stringify(cfg));
  addLog('시스템 설정 변경','config','ok');
  toast('✅ 저장 완료 — 홈페이지를 새로고침하면 반영됩니다','ok');
}

function savePlans() {
  const plans = loadPlans();
  const saved = plans.map((p,i) => {
    const featEl = document.getElementById('pl-feat-'+i);
    const visEl  = document.getElementById('pl-vis-'+i);
    const okVal  = document.getElementById('pl-ok-'+i)?.value || '';
    const noVal  = document.getElementById('pl-no-'+i)?.value || '';
    return {
      ...p,
      name:       document.getElementById('pl-name-'+i)?.value  || p.name,
      price:      document.getElementById('pl-price-'+i)?.value || p.price,
      unit:       document.getElementById('pl-unit-'+i)?.value  || p.unit,
      badge:      document.getElementById('pl-badge-'+i)?.value || '',
      desc:       document.getElementById('pl-desc-'+i)?.value  || p.desc,
      btnText:    document.getElementById('pl-btn-'+i)?.value   || p.btnText,
      featured:   featEl ? featEl.checked : !!p.featured,
      visible:    visEl  ? visEl.checked  : p.visible !== false,
      featuresOk: okVal,
      featuresNo: noVal,
      features: [
        ...okVal.split('\n').filter(s=>s.trim()).map(s=>({ok:true,  text:s.trim()})),
        ...noVal.split('\n').filter(s=>s.trim()).map(s=>({ok:false, text:s.trim()})),
      ],
    };
  });
  localStorage.setItem('sa_pricing', JSON.stringify(saved));
  addLog('요금제 수정', saved.map(p=>p.name).join('/'), 'ok');
  toast('✅ 요금제 저장 완료! 홈페이지를 새로고침하면 바로 반영됩니다','ok');
}

function exportData() {
  const data = {subscribers:DB.get('subscribers'),licenses:DB.get('licenses'),logs:DB.get('logs'),config:DB.obj('config'),exportedAt:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='contractos_data_'+new Date().toLocaleDateString('ko-KR').replace(/\. ?/g,'').replace(/ /g,'')+'.json';
  a.click(); toast('내보내기 완료','ok');
}

function dlSubXl() {
  const subs=DB.get('subscribers');
  const rows=[['회사명','사업자번호','대표자','담당자','연락처','이메일','플랜','상태','월요금','시작일','만료일','라이선스키','메모']];
  subs.forEach(s=>rows.push([s.company,s.bizno,s.ceo,s.name,s.phone,s.email,s.plan,s.status,s.fee,s.start,s.end,s.license,s.memo]));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:14},{wch:10},{wch:10},{wch:14},{wch:24},{wch:10},{wch:8},{wch:10},{wch:12},{wch:12},{wch:22},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'구독자명단');
  XLSX.writeFile(wb,'ContractOS_구독자명단.xlsx');
  toast('엑셀 다운로드 완료','ok');
}

// ── 모달 제거 ─────────────────────────────────────────
function removeModal() {
  document.querySelectorAll('.mo').forEach(m=>m.remove());
}

// ── 시작 ─────────────────────────────────────────────
checkSA();
</script>
